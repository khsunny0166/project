<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>준호쌤 운동앱</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#000000">

<style>

body{
margin:0;
font-family:system-ui;
background:#111;
color:white;
}

header{
text-align:center;
padding:20px;
font-size:22px;
font-weight:bold;
background:#000;
}

#search{
width:85%;
padding:10px;
border-radius:10px;
border:none;
margin-top:10px;
}

nav{
display:flex;
justify-content:center;
gap:10px;
padding:10px;
background:#1a1a1a;
}

nav button{
padding:10px 14px;
border:none;
border-radius:8px;
font-weight:bold;
}

.card{
background:#1e1e1e;
margin:12px;
padding:14px;
border-radius:12px;
}

.card img{
width:100%;
border-radius:10px;
}

.youtube{
background:#ff0000;
color:white;
margin-top:8px;
padding:10px;
border:none;
border-radius:8px;
width:100%;
}

.installGuide{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#222;
padding:14px;
border-radius:12px;
font-size:14px;
z-index:9999;
box-shadow:0 5px 20px rgba(0,0,0,0.5);
}

</style>

</head>

<body>

<header>

💪 준호쌤 운동

<br>

<input id="search" placeholder="운동 검색">

</header>

<nav>

<button onclick="showExercise()">운동</button>
<button onclick="showInfo()">정보</button>

</nav>

<div id="content"></div>

<div id="installBox" class="installGuide">

📱 앱처럼 사용하려면

<br><br>

Chrome → 메뉴 ⋮ → 홈 화면에 추가  
Safari → 공유 → 홈 화면에 추가  
Samsung → 메뉴 → 홈 화면에 추가

<br><br>

<button onclick="closeInstall()">닫기</button>

</div>

<script>

const exercises=[

{
name:"스쿼트",
video:"aclHkVaku9U"
},

{
name:"푸쉬업",
video:"IODxDxX7oi4"
},

{
name:"플랭크",
video:"pSHjTRCQxIw"
}

];

function showExercise(term=""){

let list=exercises;

if(term){

list=exercises.filter(e=>
e.name.includes(term)
);

}

const content=document.getElementById("content");

content.innerHTML="";

list.forEach(e=>{

const thumb=`https://img.youtube.com/vi/${e.video}/0.jpg`;

content.innerHTML+=`

<div class="card">

<h3>${e.name}</h3>

<img src="${thumb}">

<button class="youtube"
onclick="openYoutube('${e.video}')">

운동 영상 보기

</button>

</div>

`;

});

}

function showInfo(){

document.getElementById("content").innerHTML=`

<div class="card">

<h3>박준호 선생님 유튜브 채널</h3>

<button class="youtube"
onclick="openChannel()">

채널 열기

</button>

</div>

`;

}

function openYoutube(id){

const url=`https://www.youtube.com/watch?v=${id}`;

const app=`vnd.youtube://${id}`;

window.location.href=app;

setTimeout(()=>{
window.open(url,"_blank");
},500);

}

function openChannel(){

const url="https://youtube.com/channel/UCLQI9kOHxRCMwEHcx8M3nOA";

window.location.href="vnd.youtube://channel/UCLQI9kOHxRCMwEHcx8M3nOA";

setTimeout(()=>{
window.open(url,"_blank");
},500);

}

document.getElementById("search").oninput=(e)=>{

showExercise(e.target.value);

};

function closeInstall(){

document.getElementById("installBox").style.display="none";

}

showExercise();

if("serviceWorker" in navigator){

navigator.serviceWorker.register("./service-worker.js");

}

</script>

</body>
</html>
