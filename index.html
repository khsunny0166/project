<!DOCTYPE html>  
<html lang="ko">  
<head>  
<meta charset="utf-8" />  
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />  
<link rel="manifest" href="/project/manifest.json?v=1.2">
<title>준호쌤 운동가이드</title>  
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;800&display=swap" rel="stylesheet">  
<style>  
:root{ --accent:#ffffff; --bg-dark:#111; --bg-dark2:#222; --bg-dark3:#444; --text:#fff; --vh: 100vh; }  
html { font-size: 14px !important; }
*{ box-sizing:border-box; }  
html, body { height: var(--vh); margin: 0; overflow: hidden; }
body { height: var(--vh); font-family: 'Noto Sans KR', sans-serif; color:var(--text); background-color: var(--bg-dark); position: relative; font-size: 14px !important; line-height: 1.5; }  

.bg-fixed { 
    position: fixed; top: 0; left: 0; bottom: 0; width: 100%; z-index: -2; height: var(--vh); 
    background: url('https://i.postimg.cc/qMnnw9Gt/Screen-Recording-20260116-214823-Cap-Cut.jpg') no-repeat center center / cover; 
}  

#main-scroll-wrapper { position: absolute; top: 0; bottom: 0; left: 0; right: 0; width: 100%; height: auto; overflow-y: auto; padding: 15px; z-index: 10; }
header, .tabs, .subtabs, #content { position: relative; z-index: 1; }  

#intro{ position:fixed; top:0; left:0; width:100%; height:var(--vh); background:#000; display:flex; justify-content:center; align-items:center; z-index:2000; transition:opacity .45s; }  
.intro-mobile { display: block; width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
.intro-desktop { display: none; width: 100%; height: 100%; object-fit: cover; cursor: pointer; }

@media (min-width: 1024px) {
    .bg-fixed { background: url('https://i.postimg.cc/MZnr6pWQ/Screen-Recording-20260116-221151-Cap-Cut.jpg') no-repeat center center / cover; }
    .intro-mobile { display: none; }
    .intro-desktop { display: block; }
}

header{ text-align:center; margin-bottom:10px; display:flex; justify-content:center; align-items:center; gap:8px; }  
header img.logo{ height:40px; } 
header h1{ font-size:1.6rem; margin:0; text-shadow:2px 2px 6px rgba(0,0,0,.6); }  

.tabs{ display:flex; justify-content:center; gap:8px; flex-wrap:wrap; margin-bottom:10px; }  
.tab{ background:var(--bg-dark3); color:var(--text); border:none; padding:5px 14px; border-radius:20px; cursor:pointer; font-weight:700; font-size:1rem; transition:all .14s; }  
.tab.active{ background:#A9A9A9; color:#fff; box-shadow:0 6px 18px rgba(0,0,0,.45); }  

.subtabs{ display:flex; justify-content:center; gap:6px; flex-wrap:wrap; margin:8px 0; }  
.subtab{ background:var(--bg-dark2); color:var(--text); border:none; padding:5px 12px; border-radius:14px; cursor:pointer; font-weight:700; font-size:0.95rem; transition:all .12s; display:flex; align-items:center; justify-content:center; gap:4px; }  
.subtab.active{ background:#A9A9A9; font-weight:800; }  

#search-wrapper { position: relative; left: 50%; transform: translateX(-50%); z-index: 10; width: 260px; height: 0; overflow: hidden; opacity: 0; pointer-events: none; transition: all 0.2s ease-out; }  
#search-wrapper.active { opacity: 1; pointer-events: auto; height: 38px; margin-top: 8px; margin-bottom: 4px; }  
#search-wrapper input { width: 100%; height: 100%; padding: 5px 15px; border-radius: 15px; font-size: 1.1rem; border: 2px solid #A9A9A9; background-color: white; color: #111; outline: none; }  

#content{ max-width:380px; margin:8px auto; padding:5px; }  
.move-list-card { background: rgba(128, 128, 128, 0.5); padding: 12px 15px; margin: 8px 0; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: transform 0.1s; }
.move-list-card:active { transform: scale(0.98); }
.fav-star { font-size: 1.3rem; margin-right: 10px; cursor: pointer; color: #777; transition: color 0.2s; }
.fav-star.on { color: #FFD700; }

/* 모달: 배경과 콘텐츠 모두 클릭 시 닫히도록 설정 */
#modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 5000; display: none; justify-content: center; align-items: center; padding: 20px; cursor: pointer; }
#modal-content { background: #222; width: 100%; max-width: 360px; border-radius: 20px; max-height: 90vh; overflow-y: auto; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #444; }

.modal-body { padding: 20px; }
.modal-img-box { width: 100%; border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 15px; }
.modal-img-box img { width: 100%; height: auto; display: block; object-fit: contain; }
.modal-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
.modal-title { font-size: 1.4rem; font-weight: 800; }
.modal-links { display: flex; gap: 12px; }
.modal-links img { width: 24px; height: 24px; cursor: pointer; }
.modal-target-box { background: #333; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 15px; }
.modal-target-label { font-size: 0.8rem; color: #aaa; display: block; }
.modal-target-value { font-size: 1rem; color: #ffd700; font-weight: 800; }
.modal-desc-row { display: flex; margin-bottom: 4px; line-height: 1.6; color: #eee; word-break: keep-all; }
.modal-desc-num { min-width: 20px; font-weight: bold; flex-shrink: 0; }
.modal-desc-text { flex: 1; white-space: pre-wrap; }

.info-card{ background:rgba(128, 128, 128, 0.5); border-radius:10px; padding:12px 15px; margin:6px 0; font-weight:700; display:flex; align-items:center; justify-content:center; cursor:pointer; }
.hidden{ display:none !important; }  
.fade{ transition:opacity .18s; }  

#image-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: none; justify-content: center; align-items: center; z-index: 10000; cursor: zoom-out; }
#image-overlay img.is-qr { 
    width: auto;          /* 너비 자동 */
    height: auto;         /* 높이 자동 */
    max-width: 90vw;      /* 화면 너비의 최대 90% */
    max-height: 80vh;     /* 화면 높리의 최대 80% (세로가 기니까 중요) */
    object-fit: contain;  /* 이미지가 잘리지 않고 전체가 다 보이게 함 */
    border-radius: 20px; 
    background: white; 
    border: 5px solid white; 
}
#install-banner { position:fixed; bottom:-120px; left:15px; right:15px; background:#222; padding:15px; border-radius:15px; z-index:9999; transition:bottom 0.4s ease; border:1px solid #444; display:flex; justify-content:space-between; align-items:center; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
</style>  
</head>  
<body>  
<div class="bg-fixed"></div>  

<div id="intro" onclick="hideIntro()">
    <img src="https://i.postimg.cc/WpytQX4x/Screen-Recording-20260116-214823-Cap-Cut-ezgif-com-video-to-gif-converter.gif" class="intro-mobile" alt="인트로 모바일">
    <img src="https://i.postimg.cc/xdstQWhc/Screen-Recording-20260116-221151-Cap-Cut-ezgif-com-video-to-gif-converter.gif" class="intro-desktop" alt="인트로 데스크탑">
</div> 

<div id="modal-overlay" onclick="closeModal()">
    <div id="modal-content" onclick="closeModal()">
        <div class="modal-body" id="modal-body-content"></div>
    </div>
</div>

<div id="main-scroll-wrapper">
  <header>  
    <img class="logo" src="https://i.postimg.cc/QxWSC2MD/Screenshot-20251029-084633-KakaoTalk.png" alt="준호쌤">  
    <h1>준호쌤 운동가이드</h1>  
  </header>  
  <div class="tabs" id="main-tabs">  
    <button class="tab" id="tab-videos">운동영상</button>  
    <button class="tab" id="tab-info">운동정보</button>  
  </div>  
  <div class="subtabs hidden fade" id="type-tabs"></div>  
  <div class="subtabs hidden fade" id="part-tabs"></div>  
  <div id="search-wrapper"><input type="text" id="search-input" placeholder="운동 이름 검색..."></div>  
  <div id="content" class="fade"></div>  
</div> 

<div id="image-overlay" onclick="closeImage()">
    <img id="overlay-img" src="" alt="확대 이미지">
</div>

<div id="install-banner">
    <div style="font-size:0.95rem; color:#fff; font-weight:bold;">📱 앱으로 설치해서 편하게 보세요!</div>
    <div style="display:flex; gap:10px;">
        <button onclick="closeBanner()" style="background:#444; color:#fff; border:none; padding:8px 14px; border-radius:8px; cursor:pointer;">나중에</button>
        <button id="btn-install" style="background:#fff; color:#000; border:none; padding:8px 14px; border-radius:8px; cursor:pointer; font-weight:bold;">설치하기</button>
    </div>
</div>

<script>  
function setViewportHeight() { let vh = window.innerHeight * 0.01; document.documentElement.style.setProperty('--vh', `${vh * 100}px`); }
window.addEventListener('load', setViewportHeight);
window.addEventListener('resize', setViewportHeight);

function hideIntro(){ const intro = document.getElementById('intro'); intro.style.opacity='0'; setTimeout(()=>intro.style.display='none',450); }  

let deferredPrompt;
const installBanner = document.getElementById('install-banner');
window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; });

function triggerInstall() {
    if (deferredPrompt) { 
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => { deferredPrompt = null; closeBanner(); });
    } else { 
        installBanner.style.bottom = '20px';
        setTimeout(closeBanner, 4000);
    }
}
function closeBanner() { document.getElementById('install-banner').style.bottom = '-120px'; }
document.getElementById('btn-install').addEventListener('click', triggerInstall);

let favorites = JSON.parse(localStorage.getItem('gunho_favs')) || [];

function toggleFavorite(e, moveName) {
    if(e) e.stopPropagation(); 
    const idx = favorites.indexOf(moveName);
    if (idx > -1) favorites.splice(idx, 1);
    else favorites.push(moveName);
    localStorage.setItem('gunho_favs', JSON.stringify(favorites));
    
    renderMoves(document.getElementById('search-input').value.trim());
    
    const modalStar = document.querySelector('#modal-body-content .fav-star');
    if (modalStar) {
        const isNowFav = favorites.includes(moveName);
        modalStar.classList.toggle('on', isNowFav);
        modalStar.innerText = isNowFav ? '★' : '☆';
    }
}

function openImage(e, src, isQr = false) {
    if(e) e.stopPropagation();
    const overlay = document.getElementById('image-overlay');
    const overlayImg = document.getElementById('overlay-img');
    if (isQr) overlayImg.classList.add('is-qr');
    else overlayImg.classList.remove('is-qr');
    overlayImg.src = src;
    overlay.style.display = 'flex';
}
function closeImage() { document.getElementById('image-overlay').style.display = 'none'; }

function formatDesc(text) {
    if(!text) return '준비된 설명이 없습니다.';
    return text.split('\n').map(line => {
        const match = line.match(/^(\S+)\s*(.*)/);
        if (match) {
            return `<div class="modal-desc-row">
                        <div class="modal-desc-num">${match[1]}</div>
                        <div class="modal-desc-text">${match[2]}</div>
                    </div>`;
        }
        return `<div style="margin-bottom:8px; padding-left:25px; color:#eee;">${line}</div>`;
    }).join('');
}

function openModal(moveName) {
    const data = exerciseMaster[moveName];
    if(!data) return;
    const isFav = favorites.includes(moveName);
    const modalBody = document.getElementById('modal-body-content');
    modalBody.innerHTML = `
        <div class="modal-img-box">
            <img src="${data.imageUrl || 'https://via.placeholder.com/400?text=No+Image'}" alt="${moveName}">
        </div>
        <div class="modal-title-row">
            <div style="display:flex; align-items:center;">
                <span class="fav-star ${isFav?'on':''}" onclick="toggleFavorite(event, '${moveName}')">${isFav?'★':'☆'}</span>
                <span class="modal-title">${moveName}</span>
            </div>
            <div class="modal-links">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg" onclick="event.stopPropagation(); window.open('${data.youtube}', '_blank')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" onclick="event.stopPropagation(); window.open('${data.insta}', '_blank')">
            </div>
        </div>
        <div class="modal-target-box">
            <span class="modal-target-label">주요 타겟 부위</span>
            <span class="modal-target-value">${data.target}</span>
        </div>
        <div class="modal-desc">${formatDesc(data.description)}</div>
        <div style="background-color: #333; padding: 10px; border-radius: 8px; margin-top: 15px; color: #aaa;">
            <strong>💡 운동 TIP:</strong><br>
            <span style="display: block; margin-top: 5px;">${data.tip || '운동 집중!'}</span>
        </div>
    `;
    document.getElementById('modal-overlay').style.display = 'flex';
}

function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

const exerciseMaster = {
    '벤치프레스': { type: '프리웨이트', part: '가슴', target: '대흉근', imageUrl: 'https://i.postimg.cc/3JMcxvxR/benchipeuleseu.jpg', description: `1. 누웠을 때 팔을 뻗어서 여유가 되는 높이에 바벨 거치대 설정 후 눕기\n2. 뒤꿈치로 바닥 밟고, 둔근 수축, 가슴 내밀고 바벨 어깨보다 살짝 넓게 잡아주기\n3. 손에 힘 빼고 가슴 내밀면서 이완 후 이두와 가슴이 붙다는 느낌으로 밀어주기`, tip: '바벨을 내릴 때 가슴 중앙(젖꼭지 라인)으로 수직으로 내리도록 신경쓰세요.', youtube: 'https://www.youtube.com/shorts/p4v1E_o_YCc', insta: '' },
    '덤벨프레스': { type: '프리웨이트', part: '가슴', target: '대흉근', imageUrl: 'https://i.postimg.cc/BQDRTCVH/deombelpeuleseu.jpg', description: `1. 덤벨 중앙 잡고, 덤벨 오버그립으로 만들어서 하늘보고 눕기\n2. 뒤꿈치로 바닥 밟고, 둔근 수축, 가슴 내밀어 어깨 내려주기\n3. 턱 당기고 가슴 내밀면서 이완 후 이두와 가슴이 붙게 밀어주기`, tip: '덤벨이 서로 부딪히지 않게 수직 궤적을 유지하는 것이 중요합니다.', youtube: '', insta: '' },
    '덤벨플라이': { type: '프리웨이트', part: '가슴', target: '대흉근', imageUrl: 'https://i.postimg.cc/k4BpBNSM/deombelpeullai.jpg', description: `1. 덤벨 중앙 잡고, 덤벨 뉴트럴그립으로 만들어서 하늘보고 눕기\n2. 어깨에 부담 없는 선에서 옆으로 나란히 하다가 팔꿈치 살짝 구부리면서 가슴 이완시켜주기\n3. 앞으로 밀듯 가슴 내밀면서 원위치 만들어주기`, tip: '안아주는 느낌으로 가슴 근육의 바깥쪽을 늘려주세요.', youtube: '', insta: '' },
    '푸쉬업': { type: '프리웨이트', part: '가슴', target: '대흉근', imageUrl: 'https://i.postimg.cc/x165MJn3/puswieob.jpg', description: `1. 손은 45º 정도 틀어서 어깨 넓이로 바닥 짚어주기\n2. 손과 팔꿈치가 수직 위치에 있게 팔꿈치 벌리지 않고, 등 접으면서 내려가주기\n3. 뒤꿈치, 엉덩이, 뒤통수가 정렬이 되게 자세 유지하면서 가슴과 팔 붙이면서 바닥 밀어주기`, tip: '엉덩이가 아래로 처지거나 위로 들리지 않게 복부 힘을 유지하세요.', youtube: '', insta: '' },
    '인클라인 덤벨프레스': { type: '프리웨이트', part: '가슴', target: '윗가슴', imageUrl: 'https://i.postimg.cc/vZhqh2Lx/inkeullain-deombel-peuleseu.jpg', description: `1. 벤치 2칸 올려서 덤벨 중앙 잡고 하늘보고 눕기\n2. 덤벨이 쇄골 아래쪽 가슴 옆으로 가게 내렸다가 가슴과 이두 붙이면서 밀어주기\n3. 팔꿈치가 과하게 벌어지거나 덤벨이 위·아래로 쏠리지 않게 수직 맞춰주기`, tip: '벤치 각도가 너무 높으면 어깨 개입이 심해지니 30~45도 사이가 적당합니다.', youtube: '', insta: '' },
    '인클라인 벤치프레스': { type: '프리웨이트', part: '가슴', target: '윗가슴', imageUrl: 'https://i.postimg.cc/6qCzvMp5/inkeullain-benchipeuleseu.jpg', description: `1. 벤치 두 칸 올리고 누웠을 때 팔을 뻗어서 여유가 되는 높이에 바벨 거치대 설정 후 눕기\n2. 바벨은 어깨 넓이보다 살짝 넓게 잡고, 쇄골 아래로 바벨이 오도록 내렸다가 가슴 내밀면서 밀어주기\n3. 팔꿈치가 과하게 벌어지지 않게 주의해주기`, tip: '바벨이 턱이나 목으로 오지 않도록 쇄골 아랫부분으로 내리세요.', youtube: '', insta: '' },
    '인클라인 덤벨 플라이': { type: '프리웨이트', part: '가슴', target: '윗가슴', imageUrl: 'https://i.postimg.cc/wvyw6qKT/inkeullain-deombel-peullai.jpg', description: `1. 벤치 2칸 올리고 덤벨 뉴트럴그립으로 잡고 가슴 들고 누워주기\n2. 덤벨이 쇄골 라인에서 팔이 벌어지면서 팔꿈치 구부려서 가슴 이완시켜주기\n3. 가슴 내밀면서 덤벨 다시 쇄골 쪽으로 가게 밀어주기`, tip: '과하게 팔을 벌리면 어깨 부상의 위험이 있으니 주의하세요.', youtube: '', insta: '' },
    '풀오버(가슴)': { type: '프리웨이트', part: '가슴', target: '대흉근, 광배근', imageUrl: 'https://i.postimg.cc/Hkk4YYXs/pul-obeo-deung.webp', description: `1. 벤치에 누워서 덤벨 받쳐 잡기\n2. 팔꿈치가 옆을 보게 살짝 돌린 후 골반 아래로 내리면서 만세 하기\n3. 덤벨이 반원을 그리도록 덤벨을 앞으로 밀듯 올려주기`, tip: '덤벨을 내릴 때 흉곽을 확장시키며 숨을 들이마시세요.', youtube: '', insta: '' },

let currentType='', currentPart=''; 
const typeTabs=document.getElementById('type-tabs'), partTabs=document.getElementById('part-tabs'), content=document.getElementById('content'), searchWrapper=document.getElementById('search-wrapper'), searchInput = document.getElementById('search-input');

function renderTypeTabs(){  
  typeTabs.innerHTML=''; 
  const types=['프리웨이트','머신', '유산소', '검색', '즐겨찾기']; 
  types.forEach(t=>{  
    const btn=document.createElement('button'); btn.className='subtab';  
    if(t==='검색'){
      btn.innerHTML=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>`;
      btn.onclick=()=>{
        document.querySelectorAll('#type-tabs .subtab').forEach(x=>x.classList.remove('active')); btn.classList.add('active');  
        currentType='ALL_SEARCH'; currentPart=''; searchWrapper.classList.add('active');
        searchInput.value = ''; content.innerHTML=''; partTabs.classList.add('hidden');
        setTimeout(() => { searchInput.focus(); }, 10);
      };
    } else if(t==='즐겨찾기'){
      btn.innerHTML=`<span style="color: #FFD700;">★</span>`;
      btn.onclick=()=>{
        document.querySelectorAll('#type-tabs .subtab').forEach(x=>x.classList.remove('active')); btn.classList.add('active');  
        currentType='FAVORITE'; currentPart=''; searchWrapper.classList.remove('active');
        content.innerHTML=''; partTabs.classList.add('hidden'); renderMoves();
      };
    } else { 
        btn.textContent=t; btn.onclick=()=>{ document.querySelectorAll('#type-tabs .subtab').forEach(x=>x.classList.remove('active')); btn.classList.add('active'); content.innerHTML=''; currentPart=''; searchInput.value = ''; currentType=t; searchWrapper.classList.remove('active'); renderPartTabs(); };  
    }
    typeTabs.appendChild(btn);  
  });  
  typeTabs.classList.remove('hidden'); 
}  
  
function renderPartTabs(){  
  partTabs.innerHTML=''; if(!currentType) return; 
  const parts = [...new Set(Object.values(exerciseMaster).filter(ex => ex.type === currentType).map(ex => ex.part))];
  parts.forEach(p=>{  
    const btn=document.createElement('button'); btn.className='subtab'; btn.textContent=p;  
    btn.onclick=()=>{ document.querySelectorAll('#part-tabs .subtab').forEach(x=>x.classList.remove('active')); btn.classList.add('active'); currentPart=p; renderMoves(); };  
    partTabs.appendChild(btn);  
  });
  partTabs.classList.remove('hidden'); 
}  

function renderMoves(searchTerm = '') {  
  content.innerHTML = ''; 
  let moves = [];
  if (currentType === 'ALL_SEARCH') {
      moves = Object.keys(exerciseMaster).filter(m => m.toLowerCase().includes(searchTerm.toLowerCase()));
      moves.sort((a,b) => a.localeCompare(b, 'ko'));
  } else if (currentType === 'FAVORITE') {
      moves = favorites;
      if(moves.length === 0) { content.innerHTML = '<div style="text-align:center; padding:40px; color:#888;">즐겨찾기가 비어있습니다.</div>'; return; }
  } else if (currentType && currentPart) {
      moves = Object.keys(exerciseMaster).filter(m => exerciseMaster[m].type === currentType && exerciseMaster[m].part === currentPart);
  } else return;

  moves.forEach(moveName => {
    const isFav = favorites.includes(moveName);
    const card = document.createElement('div'); 
    card.className = 'move-list-card';
    card.onclick = () => openModal(moveName);
    card.innerHTML = `
        <div style="display:flex; align-items:center;">
            <span class="fav-star ${isFav?'on':''}" onclick="toggleFavorite(event, '${moveName}')">${isFav?'★':'☆'}</span>
            <span style="font-weight:700; font-size:1.1rem;">${moveName}</span>
        </div>
        <div style="color:#888; font-size:1.2rem;">〉</div>
    `;
    content.appendChild(card);
  });
}

searchInput.oninput=()=>renderMoves(searchInput.value.trim());
document.getElementById('tab-videos').onclick=()=>{ document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.getElementById('tab-videos').classList.add('active'); currentType = ''; currentPart = ''; renderTypeTabs(); partTabs.classList.add('hidden'); searchWrapper.classList.remove('active'); content.innerHTML=''; };
document.getElementById('tab-info').onclick=()=>{ document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.getElementById('tab-info').classList.add('active'); typeTabs.classList.add('hidden'); partTabs.classList.add('hidden'); searchWrapper.classList.remove('active'); renderInfoContent(); };

function renderInfoContent(){  
  const info=[ 
    { text:'박준호선생님 블로그', url:'https://www.jungho-park.com/', icon:'https://i.postimg.cc/hj2NGBJ9/Screenshot-20251116-221434-Samsung-Internet.jpg', type:'web' }, 
    { text:'박준호선생님 카카오톡', url:'https://i.postimg.cc/1zhC9MYr/1773327286101.png', icon:'https://upload.wikimedia.org/wikipedia/commons/e/e3/KakaoTalk_logo.svg', type:'kakao' }, 
    { text:'박준호선생님 유튜브채널', url:'https://youtube.com/channel/UCLQI9kOHxRCMwEHcx8M3nOA?si=rC6uT6zjooxsXg-S', icon:'https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg', type:'youtube' }, 
    { text:'박준호선생님 인스타그램', url:'https://www.instagram.com/jun_ho910', icon:'https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg', type:'insta' },
    { text:'홈화면 바로가기 설치', url:'#', icon:'home', type:'install' } 
  ];    
  content.innerHTML = ''; 
  info.forEach(item => { 
    const card = document.createElement('div'); 
    card.className = 'info-card'; 
    card.onclick = (e) => {
        if(item.type === 'web') window.open(item.url, '_blank');
        else if(item.type === 'install') triggerInstall(); 
        else if(item.type === 'kakao') openImage(e, item.url, true);
        else window.open(item.url, '_blank');
    };
    let iconHtml = (item.icon === 'home') ? `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" style="margin-right:12px;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>` : `<img src="${item.icon}" style="width:20px; height:20px; margin-right:12px; border-radius:4px; object-fit:cover;">`;
    card.innerHTML = `${iconHtml} ${item.text}`; 
    content.appendChild(card); 
  });
}

if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW fail', err)); }); }
</script>
