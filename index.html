<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>준호쌤 운동앱</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#000000">

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

header{
text-align:center;
padding:20px;
background:#000;
}

nav{
display:flex;
justify-content:center;
gap:10px;
padding:10px;
background:#1a1a1a;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.card{
background:#1e1e1e;
margin:12px;
padding:14px;
border-radius:12px;
}

.youtube-btn{
background:#ff0000;
color:white;
margin-top:8px;
}

</style>

</head>

<body>

<header>
<h1>💪 준호쌤 운동</h1>
</header>

<nav>
<button onclick="showExercise()">운동</button>
<button onclick="showInfo()">정보</button>
</nav>

<div id="content"></div>

<script>

function showExercise(){

document.getElementById("content").innerHTML=`

<div class="card">
<h3>스쿼트</h3>
<button class="youtube-btn"
onclick="openYoutube('https://www.youtube.com/watch?v=aclHkVaku9U')">
운동 영상 보기
</button>
</div>

`;

}

function showInfo(){

document.getElementById("content").innerHTML=`

<div class="card">
<h3>박준호 선생님 유튜브 채널</h3>

<button onclick="openChannel('https://youtube.com/channel/UCLQI9kOHxRCMwEHcx8M3nOA')">
채널 열기
</button>

</div>

`;

}

function openYoutube(url){

const appUrl=url.replace("https://www.youtube.com","vnd.youtube://");

window.location.href=appUrl;

setTimeout(()=>{
window.open(url,"_blank");
},500);

}

function openChannel(url){

const appUrl=url.replace("https://youtube.com","vnd.youtube://");

window.location.href=appUrl;

setTimeout(()=>{
window.open(url,"_blank");
},500);

}

showExercise();

/* 서비스워커 등록 */

if("serviceWorker" in navigator){

navigator.serviceWorker.register("./service-worker.js")
.then(()=>console.log("SW 등록 성공"));

}

</script>

</body>
</html>
